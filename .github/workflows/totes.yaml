# ======================================================================
# Totes Team Pipeline
# ======================================================================

name: Deploy Totes

on:
  push:
    branches: [dev, staging, prod]
    paths:
      - 'Deployment/Spoke/Totes/**'
      - 'Workload/Spoke/Totes/**'
      - 'Modules/service-project/**'
      - 'Modules/compute-vm/**'
      - 'Modules/cloud-sql/**'
      - 'Modules/storage-bucket/**'

jobs:
  deploy:
    uses: ./.github/workflows/deploy-app.yaml
    with:
      workload-path: Spoke/Totes
      environment: ${{ github.ref_name }}
    secrets: inherit
