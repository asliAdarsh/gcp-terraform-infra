# ======================================================================
# Reusable Deploy App Workflow
# ======================================================================

name: Deploy App

on:
  workflow_call:
    inputs:
      workload-path:
        description: "Path under Workload/ (e.g. Core, Spoke/Clynz)"
        required: true
        type: string
      environment:
        description: "Target environment (dev, staging, prod)"
        required: true
        type: string
      run-apply:
        description: "If true, run terraform apply after plan"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init
        working-directory: Workload/${{ inputs.workload-path }}
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        working-directory: Workload/${{ inputs.workload-path }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: Workload/${{ inputs.workload-path }}
        run: |
          terraform plan \
            -var="organization_id=${{ secrets.ORG_ID }}" \
            -var="billing_account_id=${{ secrets.BILLING_ACCOUNT }}" \
            -var="state_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="region=asia-south1" \
            -var-file=${{ github.workspace }}/Deployment/${{ inputs.workload-path }}/${{ inputs.environment }}.tfvars \
            -no-color \
            -out=tfplan

      - name: Terraform Apply
        if: inputs.run-apply
        working-directory: Workload/${{ inputs.workload-path }}
        run: terraform apply -auto-approve tfplan
