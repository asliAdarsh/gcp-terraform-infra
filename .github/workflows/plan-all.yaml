# ======================================================================
# Plan All Stages Workflow — plan-all.yaml
# ======================================================================
# Manual trigger to plan ALL stages sequentially (respecting state deps).
# Useful for: pre-deployment review, DR validation, compliance checks.
#
# Stages run in order because each consumes the previous stage's state:
#   bootstrap → organization → networks → service-projects
# ======================================================================

name: Plan All Stages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to plan (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  # ── Stage 1: Bootstrap (read-only check) ─────────────────────
  plan-bootstrap:
    name: Plan Bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
      - name: Plan
        run: |
          cd 01bootstrap
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          terraform plan -no-color

  # ── Stage 2: Organization ───────────────────────────────────
  plan-organization:
    name: Plan Organization
    runs-on: ubuntu-latest
    needs: plan-bootstrap  # Sequential: org needs bootstrap state
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
      - name: Plan
        run: |
          cd 02organization
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          terraform plan -no-color

  # ── Stage 3: Networks ───────────────────────────────────────
  plan-networks:
    name: Plan Networks
    runs-on: ubuntu-latest
    needs: plan-organization
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
      - name: Plan
        run: |
          cd 03networks
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          terraform plan -no-color

  # ── Stage 4: Service Projects (per environment) ─────────────
  plan-service-projects:
    name: Plan Service Projects (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: plan-networks
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
      - name: Plan
        run: |
          cd 04service-projects
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          terraform plan \
            -var-file=../Deployment/${{ inputs.environment }}.tfvars \
            -no-color
