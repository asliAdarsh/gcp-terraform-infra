# ======================================================================
# PR Check — validates all changed Terraform files
# ======================================================================

name: PR Check

on:
  pull_request:
    branches: [dev, staging, prod]
    paths:
      - 'Workload/**'
      - 'Deployment/**'
      - 'Modules/**'

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Validate changed modules
        run: |
          for dir in $(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^Workload/' | cut -d/ -f1-3 | sort -u); do
            if [ -f "$dir/main.tf" ]; then
              echo "=== Validating $dir ==="
              cd "$dir"
              terraform init -backend=false
              terraform validate
              cd ../..
            fi
          done
