# ======================================================================
# PR Check Workflow
# ======================================================================
# Runs on PRs to validate Terraform formatting and syntax for any
# changed Workload/ or Deployment/ files.
# ======================================================================

name: PR Check

on:
  pull_request:
    branches: [dev, staging, prod]
    paths:
      - 'Workload/**'
      - 'Deployment/**'
      - 'Modules/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      # Format check across all Terraform files
      - name: Terraform Format
        run: terraform fmt -check -recursive
        continue-on-error: true

      # Validate each Workload module that was changed
      - name: Terraform Validate
        run: |
          for dir in $(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^Workload/' | cut -d/ -f1-3 | sort -u); do
            if [ -f "$dir/main.tf" ]; then
              echo "=== Validating $dir ==="
              cd "$dir"
              terraform init -backend=false
              terraform validate
              cd ../..
            fi
          done
